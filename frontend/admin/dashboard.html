<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickBite — Admin Dashboard</title>
  <meta name="description" content="Admin portal for system-wide oversight of orders and users." />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <!-- ── Navbar ────────────────────────────────────────────────────────────── -->
  <nav class="navbar">
    <a class="navbar-brand" href="#">
      <span class="brand-icon">⚙️</span>
      <span class="brand-name">Admin Portal</span>
    </a>
    <div class="navbar-right">
      <div class="user-pill">
        <div class="user-avatar" id="user-avatar">A</div>
        <span id="user-name">Loading…</span>
        <span class="badge badge-admin" style="font-size:0.65rem;">admin</span>
      </div>
      <button class="nav-link" onclick="logout()">Sign Out</button>
    </div>
  </nav>

  <!-- ── Page Content ──────────────────────────────────────────────────────── -->
  <main class="page-wrapper">

    <div class="page-header flex justify-between items-center">
      <div>
        <h1 class="page-title">System Overview</h1>
        <p class="page-subtitle">Read-only visibility across all orders and users</p>
      </div>
      <button class="btn btn-secondary" onclick="loadAll()">↻ Refresh</button>
    </div>

    <!-- ── Stats row ─────────────────────────────────────────────────────── -->
    <div class="grid-4 section">
      <div class="stat-card">
        <div class="stat-icon stat-icon-blue">📋</div>
        <div><div class="stat-value" id="stat-total">—</div><div class="stat-label">Total Orders</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon stat-icon-orange">⏳</div>
        <div><div class="stat-value" id="stat-active">—</div><div class="stat-label">Active Orders</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon stat-icon-green">✅</div>
        <div><div class="stat-value" id="stat-delivered">—</div><div class="stat-label">Delivered</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon stat-icon-purple">👥</div>
        <div><div class="stat-value" id="stat-users">—</div><div class="stat-label">Registered Users</div></div>
      </div>
    </div>

    <!-- Revenue stat -->
    <div class="stat-card section" style="max-width:320px;">
      <div class="stat-icon stat-icon-amber">💰</div>
      <div>
        <div class="stat-value" id="stat-revenue">—</div>
        <div class="stat-label">Total Revenue (Delivered)</div>
      </div>
    </div>

    <!-- ── Tab Switcher ──────────────────────────────────────────────────── -->
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="switchTab('orders', this)">📋 All Orders</button>
      <button class="filter-tab" onclick="switchTab('users', this)">👥 All Users</button>
    </div>

    <!-- ── Orders Table ─────────────────────────────────────────────────── -->
    <div id="section-orders">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Customer</th>
              <th>Items</th>
              <th>Total</th>
              <th>Status</th>
              <th>Agent</th>
              <th>Time</th>
            </tr>
          </thead>
          <tbody id="orders-body">
            <tr><td colspan="7" style="text-align:center; padding:2.5rem; color:var(--text-muted);">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- ── Users Table ──────────────────────────────────────────────────── -->
    <div id="section-users" class="hidden">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
            </tr>
          </thead>
          <tbody id="users-body">
            <tr><td colspan="4" style="text-align:center; padding:2.5rem; color:var(--text-muted);">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <script src="../js/api.js"></script>
  <script>
    // ── Lifecycle ─────────────────────────────────────────────────────────────
    window.addEventListener('load', async () => {
      const user = await requireAuth('admin');
      if (!user) return;
      populateNavbar(user);
      await loadAll();
    });

    // ── Tab switching ─────────────────────────────────────────────────────────
    function switchTab(tab, el) {
      document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('section-orders').classList.toggle('hidden', tab !== 'orders');
      document.getElementById('section-users').classList.toggle('hidden', tab !== 'users');
    }

    // ── Load all data ─────────────────────────────────────────────────────────
    async function loadAll() {
      try {
        const [orders, users] = await Promise.all([
          apiFetch('/api/admin/orders'),
          apiFetch('/api/admin/users'),
        ]);
        renderStats(orders, users);
        renderOrdersTable(orders);
        renderUsersTable(users);
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    // ── Stats ─────────────────────────────────────────────────────────────────
    function renderStats(orders, users) {
      const delivered = orders.filter(o => o.status === 'Delivered');
      const active    = orders.filter(o => !['Delivered', 'Rejected'].includes(o.status));
      const revenue   = delivered.reduce((s, o) => s + o.total_price, 0);

      document.getElementById('stat-total').textContent     = orders.length;
      document.getElementById('stat-active').textContent    = active.length;
      document.getElementById('stat-delivered').textContent = delivered.length;
      document.getElementById('stat-users').textContent     = users.length;
      document.getElementById('stat-revenue').textContent   = formatCurrency(revenue);
    }

    // ── Orders table ──────────────────────────────────────────────────────────
    function renderOrdersTable(orders) {
      const tbody = document.getElementById('orders-body');

      if (orders.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:2.5rem; color:var(--text-muted);">No orders in the system yet.</td></tr>';
        return;
      }

      tbody.innerHTML = orders.map(order => {
        const itemSummary = order.items.map(i => `${i.item_name} ×${i.quantity}`).join(', ');
        return `
          <tr>
            <td><strong>#${order.id}</strong></td>
            <td>${order.customer_name}</td>
            <td style="font-size:0.78rem; color:var(--text-muted); max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${itemSummary}">${itemSummary}</td>
            <td><strong>${formatCurrency(order.total_price)}</strong></td>
            <td><span class="${getStatusBadgeClass(order.status)}">${order.status}</span></td>
            <td>${order.agent_name ? `<span style="font-size:0.8rem;">🛵 ${order.agent_name}</span>` : '<span class="text-muted text-xs">Not assigned</span>'}</td>
            <td style="font-size:0.77rem; color:var(--text-muted);">${formatDate(order.created_at)}</td>
          </tr>`;
      }).join('');
    }

    // ── Users table ───────────────────────────────────────────────────────────
    function renderUsersTable(users) {
      const tbody = document.getElementById('users-body');

      if (users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:2.5rem; color:var(--text-muted);">No users registered yet.</td></tr>';
        return;
      }

      tbody.innerHTML = users.map(user => `
        <tr>
          <td>${user.id}</td>
          <td><strong>${user.name}</strong></td>
          <td style="color:var(--text-muted); font-size:0.85rem;">${user.email}</td>
          <td><span class="badge badge-${user.role}">${user.role}</span></td>
        </tr>
      `).join('');
    }
  </script>
</body>
</html>
