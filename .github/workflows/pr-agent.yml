name: Qodo Merge Review

on:
  pull_request:
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  pr_agent_job:
    runs-on: ubuntu-latest
    name: Run Qodo Merge
    steps:
      - name: Qodo Merge action
        uses: Codium-ai/pr-agent@main
        env:
          CONFIG.AI_PROVIDER: "groq"
          GROQ.API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ.MODEL: "llama3-8b-8192"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
