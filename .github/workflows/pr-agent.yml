name: Qodo Merge Review

on:
  pull_request:
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  pr_agent_job:
    runs-on: ubuntu-latest
    name: Run Qodo Merge
    steps:
      - name: Qodo Merge action
        uses: Codium-ai/pr-agent@main
        env:
          CONFIG.AI_PROVIDER: "google"
          GOOGLE.GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CONFIG.MODEL: "gemini/gemini-1.5-flash"
          CONFIG.MODEL_TURBO: "gemini/gemini-1.5-flash"
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "true"
          github_action_config.auto_improve: "true"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
